files:
  temperature_file: Data/dwd_20242025.txt
  solar_file: Data/radiation_20242025.txt

window:
  start: "2024-03-17 00:00"
  end: "2024-07-17 00:00"
  dt_seconds: 120

heater:
  kind: square
  power: 800.0
  p_start: 0.0035
  min_duration_s: 1200
  max_duration_s: 3600
  seed: 456

latent:
  kind: square
  power: 7000.0
  p_start: 0.0011
  min_duration_s: 1200
  max_duration_s: 28800
  seed: 321

# model: {}  # optional override of defaults

rbpf:
  enabled: true
  nparticles: 1500
  sigma_y: 0.15
  q_states: [0.01, 0.01, 0.01, 0.01, 0.01]
  alpha_min: 0.01
  alpha_max: 25.0
  sigma_eta: 0.1
  a_lw: 0.99
  g_min: 0.05
  gate_quiet: 0.4
  gate_burst: 0.95
  resample_frac: 0.5
  horizon: 1
  substep_seconds: 60.0
  random_seed: 123

ekf:
  enabled: true
  sigma_y: 0.15
  q_states: [0.03, 0.03, 0.03, 0.03, 0.03]
  sigma_log_theta: 0.002
  init_state_std: 0.2
  init_param_log_std: 0.3
  jacobian_eps: 1.0e-5

ukf:
  enabled: true
  sigma_y: 0.15
  q_states: [0.03, 0.03, 0.03, 0.03, 0.03]
  sigma_log_theta: 0.002
  init_state_std: 0.2
  init_param_log_std: 0.3
  points_alpha: 0.1
  points_beta: 2.0
  points_kappa: 0.0
  random_seed: 456

output_dir: runs
